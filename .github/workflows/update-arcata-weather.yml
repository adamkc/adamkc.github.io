name: Update Arcata Weather Charts

on:
  schedule:
    - cron: "0 14 * * *"  # 7am Pacific (UTC-7)
  workflow_dispatch:       # allow manual runs from GitHub UI

jobs:
  update-charts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"

      - name: Install system dependencies
        run: sudo apt-get install -y libgdal-dev libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::data.table
            any::R.utils
            any::tidyr
            any::dplyr
            any::readr
            any::lubridate
            any::ggplot2
            any::scales

      - name: Retrieve NOAA data
        working-directory: scripts/arcata-weather
        run: Rscript retrieve_data.R

      - name: Build precipitation chart
        working-directory: scripts/arcata-weather
        run: Rscript build_cumulative_precip.R

      - name: Build temperature chart
        working-directory: scripts/arcata-weather
        run: Rscript build_daily_temps.R

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/arcata-weather/ghcn_arcata.csv
          git add images/arcata-cumulative-precip.png
          git add images/arcata-daily-high.png
          git diff --staged --quiet || git commit -m "Update Arcata weather charts $(date +'%Y-%m-%d')"
          git push
